<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMARÉ | Clientes</title>
<link rel="stylesheet" href="clientes.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Base de datos conectada con Airtable</p>
      <h1>AMARÉ</h1>
      <p>Gestión de clientes para eventos y experiencias personalizadas.</p>
    </section>

    <section class="card">
      <h2 id="formTitle">Registrar cliente</h2>

      <form id="clienteForm">
        <input type="hidden" id="recordId" />

        <div class="grid">
          <div class="field">
            <label>Nombre</label>
            <input type="text" id="nombre" required />
          </div>

          <div class="field">
            <label>Apellido</label>
            <input type="text" id="apellido" required />
          </div>

          <div class="field">
            <label>Correo</label>
            <input type="email" id="correo" required />
          </div>

          <div class="field">
            <label>Teléfono</label>
            <input type="text" id="telefono" required />
          </div>

          <div class="field full">
            <label>Preferencias generales</label>
            <textarea id="preferencias_generales" rows="3"></textarea>
          </div>

          <div class="field">
            <label>Fecha de registro</label>
            <input type="date" id="fecha_registro" required />
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="btnGuardar">Guardar cliente</button>
          <button type="button" id="btnCancelar" class="secondary">Cancelar edición</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="tableHeader">
        <h2>Clientes registrados</h2>
        <button id="btnActualizar" class="secondary">Actualizar</button>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Preferencias</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="clientesBody">
            <tr>
              <td colspan="8">Cargando clientes...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

<script src="clientes.js"></script>
</body>
</html>
